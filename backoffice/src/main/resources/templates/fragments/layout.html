<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Visa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<!-- Navbar Back Office -->
<nav th:fragment="navbar-back" class="navbar navbar-expand-lg navbar-campus">
    <div class="container-fluid px-4">
        <a class="navbar-brand" th:href="@{/}">
            <span class="brand-icon"><i class="bi bi-shield-lock"></i></span>
            <span>Visa — Administration</span>
        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navBack">
            <i class="bi bi-list text-white fs-4"></i>
        </button>
        <div class="collapse navbar-collapse" id="navBack">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}" th:classappend="${#strings.equals(activeMenu, 'dashboard')} ? 'active'">
                        <i class="bi bi-speedometer2 me-1"></i> Tableau de bord
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/demandes}" th:classappend="${#strings.equals(activeMenu, 'demandes')} ? 'active'">
                        <i class="bi bi-folder2-open me-1"></i> Demandes
                    </a>
                </li>
                <li class="nav-item ms-lg-3">
                    <a class="nav-link" href="/visa-front/">
                        <span class="badge-env">Front Office</span>
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Footer -->
<footer th:fragment="footer" class="footer-campus">
    <div class="container text-center">
        <p class="mb-0">&copy; 2026 — Ministère de l'Intérieur — Direction Générale de l'Immigration et de l'Émigration — Madagascar</p>
    </div>
</footer>

</body>
</html>
