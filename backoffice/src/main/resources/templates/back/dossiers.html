<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Dossiers — Administration')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar-back}" th:with="activeMenu='dossiers'"></nav>

<section class="page-hero">
    <div class="container-fluid px-4 px-lg-5">
        <div class="row align-items-center">
            <div class="col-lg-8">
                <h1><i class="bi bi-folder-fill me-2"></i>Dossiers</h1>
                <p>Dossiers cr&eacute;&eacute;s automatiquement (duplicata / transfert)</p>
            </div>
            <div class="col-lg-4 text-lg-end mt-3 mt-lg-0" style="position:relative;">
                <span class="badge bg-dark bg-opacity-25 px-3 py-2" style="font-size:0.85rem;border-radius:8px;" th:text="${#lists.size(dossiers)} + ' dossier(s)'"></span>
            </div>
        </div>
    </div>
</section>

<div class="container-fluid px-4 px-lg-5 pb-5">
    <div class="card-modern">
        <div class="card-body p-0">
            <div th:if="${#lists.isEmpty(dossiers)}" class="text-center py-5">
                <div style="width:80px;height:80px;border-radius:50%;background:var(--slate-100);display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;">
                    <i class="bi bi-folder-x" style="font-size:2rem;color:var(--slate-400);"></i>
                </div>
                <h6 style="color:var(--slate-500);font-weight:700;">Aucun dossier</h6>
                <p style="color:var(--slate-400);font-size:0.85rem;margin-bottom:0;">Les dossiers seront cr&eacute;&eacute;s automatiquement lors d'une demande duplicata ou transfert</p>
            </div>
            <div th:unless="${#lists.isEmpty(dossiers)}" class="table-responsive">
                <table class="table table-modern mb-0">
                    <thead>
                        <tr>
                            <th>N&deg; Dossier</th>
                            <th>Titulaire</th>
                            <th class="d-none d-lg-table-cell">Passeport</th>
                            <th class="d-none d-xl-table-cell">Nationalit&eacute;</th>
                            <th>Types</th>
                            <th class="d-none d-md-table-cell">Date</th>
                            <th>Demandes</th>
                            <th>Scan</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="dos : ${dossiers}">
                            <td>
                                <span class="fw-bold" th:text="${dos.numeroDossier}" style="font-size:0.82rem;"></span>
                            </td>
                            <td>
                                <div class="fw-bold" th:text="${dos.nom + ' ' + dos.prenom}" style="font-size:0.88rem;"></div>
                                <div class="d-lg-none" th:text="${dos.passeportNumero}" style="font-size:0.78rem;color:var(--slate-400);"></div>
                            </td>
                            <td class="d-none d-lg-table-cell" style="font-size:0.85rem;" th:text="${dos.passeportNumero}"></td>
                            <td class="d-none d-xl-table-cell" style="font-size:0.85rem;" th:text="${dos.nationalite}"></td>
                            <td>
                                <span th:each="dem : ${dos.demandes}" class="badge bg-primary me-1" th:text="${dem.objectifDemande.libelle}" style="font-size:0.68rem;"></span>
                            </td>
                            <td class="d-none d-md-table-cell" style="font-size:0.82rem;color:var(--slate-500);" th:text="${#temporals.format(dos.dateCreation, 'dd/MM/yyyy HH:mm')}"></td>
                            <td class="text-center">
                                <span class="badge bg-secondary" th:text="${dos.demandes.size()}" style="font-size:0.75rem;min-width:28px;"></span>
                            </td>
                            <td class="text-center">
                                <span th:if="${dos.scanTermine}" class="badge bg-success" style="font-size:0.68rem;"><i class="bi bi-lock-fill me-1"></i>Termin&eacute;</span>
                                <span th:unless="${dos.scanTermine}" class="badge bg-warning" style="font-size:0.68rem;"><i class="bi bi-unlock-fill me-1"></i>En cours</span>
                            </td>
                            <td>
                                <a th:href="@{/dossiers/{id}(id=${dos.id})}" class="btn btn-sm btn-outline-campus" style="padding:0.35rem 0.65rem;">
                                    <i class="bi bi-eye"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
