<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Dossiers — Administration')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar-back}" th:with="activeMenu='dossiers'"></nav>

<section class="page-hero">
    <div class="container-fluid px-4">
        <h1><i class="bi bi-folder-fill me-2"></i>Dossiers</h1>
        <p>Liste des dossiers créés automatiquement (duplicata / transfert)</p>
    </div>
</section>

<div class="container-fluid px-4 pb-5">
    <div class="card-modern">
        <div class="card-body p-0">
            <div th:if="${#lists.isEmpty(dossiers)}" class="text-center py-5 text-muted">
                <i class="bi bi-folder-x fs-1 d-block mb-2"></i>
                Aucun dossier pour le moment
            </div>
            <div th:unless="${#lists.isEmpty(dossiers)}" class="table-responsive">
                <table class="table table-modern mb-0">
                    <thead>
                        <tr>
                            <th>N° Dossier</th>
                            <th>Passeport</th>
                            <th>Nom</th>
                            <th>Prénom</th>
                            <th>Nationalité</th>
                            <th>Type</th>
                            <th>Date création</th>
                            <th>Demandes liées</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="dos : ${dossiers}">
                            <td class="fw-bold" th:text="${dos.numeroDossier}"></td>
                            <td th:text="${dos.passeportNumero}"></td>
                            <td th:text="${dos.nom}"></td>
                            <td th:text="${dos.prenom}"></td>
                            <td th:text="${dos.nationalite}"></td>
                            <td>
                                <span class="badge bg-primary" th:text="${dos.typeDossier.libelle}"></span>
                            </td>
                            <td th:text="${#temporals.format(dos.dateCreation, 'dd/MM/yyyy HH:mm')}"></td>
                            <td>
                                <span class="badge bg-secondary" th:text="${dos.demandes.size()}"></span>
                            </td>
                            <td>
                                <a th:href="@{/dossiers/{id}(id=${dos.id})}" class="btn btn-sm btn-outline-campus">
                                    <i class="bi bi-eye"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
