<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('D\u00e9tail dossier \u2014 Administration')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar-back}" th:with="activeMenu='dossiers'"></nav>

<section class="page-hero">
    <div class="container-fluid px-4 px-lg-5">
        <div class="row align-items-center">
            <div class="col-lg-8">
                <h1><i class="bi bi-folder-fill me-2"></i>Dossier <span th:text="${dossier.numeroDossier}"></span></h1>
                <p class="mb-0">Cr&eacute;&eacute; le <span th:text="${#temporals.format(dossier.dateCreation, 'dd/MM/yyyy')}"></span></p>
            </div>
            <div class="col-lg-4 text-lg-end mt-3 mt-lg-0" style="position:relative;">
                <span class="badge bg-dark bg-opacity-25 px-3 py-2" style="font-size:0.85rem;border-radius:8px;" th:text="${dossier.demandes.size()} + ' demande(s)'"></span>
            </div>
        </div>
    </div>
</section>

<div class="container-fluid px-4 px-lg-5 pb-5">
    <div class="row g-4">
        <div class="col-lg-4">
            <div style="position:sticky;top:90px;">
                <div class="card-modern mb-4">
                    <div class="card-header"><i class="bi bi-person-badge me-2"></i><strong>Informations</strong></div>
                    <div class="card-body" style="padding:1.25rem;">
                        <div class="detail-group">
                            <div class="detail-label">N&deg; Dossier</div>
                            <div class="detail-value" th:text="${dossier.numeroDossier}"></div>
                        </div>
                        <div class="detail-group">
                            <div class="detail-label">Titulaire</div>
                            <div class="detail-value" th:text="${dossier.nom + ' ' + dossier.prenom}"></div>
                        </div>
                        <div class="detail-group">
                            <div class="detail-label">Passeport</div>
                            <div class="detail-value" th:text="${dossier.passeportNumero}"></div>
                        </div>
                        <div class="detail-group">
                            <div class="detail-label">Nationalit&eacute;</div>
                            <div class="detail-value" th:text="${dossier.nationalite}"></div>
                        </div>
                        <div style="padding-top:0.75rem;">
                            <div class="detail-label" style="margin-bottom:0.5rem;">Types</div>
                            <span th:each="dem : ${dossier.demandes}" class="badge bg-primary me-1 mb-1" th:text="${dem.objectifDemande.libelle}" style="font-size:0.72rem;"></span>
                        </div>
                    </div>
                </div>
                <a th:href="@{/dossiers}" class="btn btn-outline-secondary w-100" style="border-radius:10px;">
                    <i class="bi bi-arrow-left me-1"></i> Retour aux dossiers
                </a>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="card-modern">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <div><i class="bi bi-folder2-open me-2"></i><strong>Demandes li&eacute;es</strong></div>
                    <span class="badge bg-secondary" th:text="${dossier.demandes.size()}" style="font-size:0.75rem;"></span>
                </div>
                <div class="card-body p-0">
                    <div th:if="${#lists.isEmpty(dossier.demandes)}" class="text-center py-5">
                        <div style="width:60px;height:60px;border-radius:50%;background:var(--slate-100);display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;">
                            <i class="bi bi-inbox" style="font-size:1.5rem;color:var(--slate-400);"></i>
                        </div>
                        <p style="color:var(--slate-400);font-size:0.85rem;margin:0;">Aucune demande li&eacute;e</p>
                    </div>
                    <div th:unless="${#lists.isEmpty(dossier.demandes)}" class="table-responsive">
                        <table class="table table-modern mb-0">
                            <thead>
                                <tr>
                                    <th>N&deg; Demande</th>
                                    <th>Objectif</th>
                                    <th class="d-none d-md-table-cell">Type visa</th>
                                    <th class="d-none d-md-table-cell">Date</th>
                                    <th>Statut</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="d : ${dossier.demandes}">
                                    <td><span class="fw-bold" th:text="${d.numeroDemande}" style="font-size:0.82rem;"></span></td>
                                    <td><span class="badge bg-secondary" th:text="${d.objectifDemande.libelle}" style="font-size:0.68rem;"></span></td>
                                    <td class="d-none d-md-table-cell" style="font-size:0.85rem;" th:text="${d.typeVisa.libelle}"></td>
                                    <td class="d-none d-md-table-cell" style="font-size:0.82rem;color:var(--slate-500);" th:text="${#temporals.format(d.dateCreation, 'dd/MM/yyyy')}"></td>
                                    <td><span class="badge badge-statut" th:classappend="${d.statut.badgeClass}" th:text="${d.statut.libelle}"></span></td>
                                    <td><a th:href="@{/demandes/{id}(id=${d.id})}" class="btn btn-sm btn-outline-campus" style="padding:0.35rem 0.65rem;"><i class="bi bi-eye"></i></a></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
