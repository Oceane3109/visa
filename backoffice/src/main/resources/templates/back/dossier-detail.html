<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Détail dossier — Administration')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar-back}" th:with="activeMenu='dossiers'"></nav>

<section class="page-hero">
    <div class="container-fluid px-4">
        <h1><i class="bi bi-folder-fill me-2"></i>Dossier <span th:text="${dossier.numeroDossier}"></span></h1>
        <p>Créé le <span th:text="${#temporals.format(dossier.dateCreation, 'dd/MM/yyyy à HH:mm')}"></span></p>
    </div>
</section>

<div class="container-fluid px-4 pb-5">
    <div class="row g-4">
        <!-- Infos dossier -->
        <div class="col-lg-4">
            <div class="card-modern">
                <div class="card-header">
                    <i class="bi bi-person-badge me-2"></i>Informations du dossier
                </div>
                <div class="card-body">
                    <dl class="row mb-0">
                        <dt class="col-sm-5">N° Dossier</dt>
                        <dd class="col-sm-7 fw-bold" th:text="${dossier.numeroDossier}"></dd>

                        <dt class="col-sm-5">Passeport</dt>
                        <dd class="col-sm-7" th:text="${dossier.passeportNumero}"></dd>

                        <dt class="col-sm-5">Nom</dt>
                        <dd class="col-sm-7" th:text="${dossier.nom}"></dd>

                        <dt class="col-sm-5">Prénom</dt>
                        <dd class="col-sm-7" th:text="${dossier.prenom}"></dd>

                        <dt class="col-sm-5">Nationalité</dt>
                        <dd class="col-sm-7" th:text="${dossier.nationalite}"></dd>

                        <dt class="col-sm-5">Types</dt>
                        <dd class="col-sm-7">
                            <span th:each="dem : ${dossier.demandes}" class="badge bg-primary me-1" th:text="${dem.objectifDemande.libelle}"></span>
                        </dd>
                    </dl>
                </div>
            </div>
        </div>

        <!-- Demandes liées -->
        <div class="col-lg-8">
            <div class="card-modern">
                <div class="card-header">
                    <i class="bi bi-folder2-open me-2"></i>Demandes liées
                    <span class="badge bg-secondary ms-2" th:text="${dossier.demandes.size()}"></span>
                </div>
                <div class="card-body p-0">
                    <div th:if="${#lists.isEmpty(dossier.demandes)}" class="text-center py-4 text-muted">
                        Aucune demande liée à ce dossier
                    </div>
                    <div th:unless="${#lists.isEmpty(dossier.demandes)}" class="table-responsive">
                        <table class="table table-modern mb-0">
                            <thead>
                                <tr>
                                    <th>N° Demande</th>
                                    <th>Objectif</th>
                                    <th>Type visa</th>
                                    <th>Date</th>
                                    <th>Statut</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="d : ${dossier.demandes}">
                                    <td class="fw-bold" th:text="${d.numeroDemande}"></td>
                                    <td th:text="${d.objectifDemande.libelle}"></td>
                                    <td th:text="${d.typeVisa.libelle}"></td>
                                    <td th:text="${#temporals.format(d.dateCreation, 'dd/MM/yyyy')}"></td>
                                    <td>
                                        <span class="badge badge-statut" th:classappend="${d.statut.badgeClass}" th:text="${d.statut.libelle}"></span>
                                    </td>
                                    <td>
                                        <a th:href="@{/demandes/{id}(id=${d.id})}" class="btn btn-sm btn-outline-campus">
                                            <i class="bi bi-eye"></i>
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="mt-3">
        <a th:href="@{/dossiers}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i> Retour aux dossiers
        </a>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
