<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Liste des demandes — Administration')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar-back}" th:with="activeMenu='demandes'"></nav>

<section class="page-hero">
    <div class="container-fluid px-4">
        <h1><i class="bi bi-folder2-open me-2"></i>Gestion des demandes</h1>
        <p>Consultez et gérez toutes les demandes de transformation de visa</p>
    </div>
</section>

<div class="container-fluid px-4 pb-5">
    <!-- Filters -->
    <div class="card-modern mb-4">
        <div class="card-body py-3">
            <div class="d-flex flex-wrap align-items-center gap-2">
                <span class="fw-bold text-primary me-2"><i class="bi bi-funnel me-1"></i> Filtrer :</span>
                <a th:href="@{/back/demandes}" class="btn btn-sm"
                   th:classappend="${filtreStatut == null} ? 'btn-campus' : 'btn-outline-secondary'">Toutes</a>
                <a th:each="s : ${statuts}" th:href="@{/back/demandes(statut=${s.name()})}"
                   class="btn btn-sm"
                   th:classappend="${#strings.equals(filtreStatut, s.name())} ? 'btn-campus' : 'btn-outline-secondary'"
                   th:text="${s.libelle}"></a>
            </div>
        </div>
    </div>

    <!-- Table -->
    <div class="card-modern">
        <div class="card-body p-0">
            <div th:if="${#lists.isEmpty(demandes)}" class="text-center py-5 text-muted">
                <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                Aucune demande trouvée
            </div>
            <div th:unless="${#lists.isEmpty(demandes)}" class="table-responsive">
                <table class="table table-modern mb-0">
                    <thead>
                        <tr>
                            <th>N° Demande</th>
                            <th>Demandeur</th>
                            <th>Nationalité</th>
                            <th>Passeport</th>
                            <th>Réf. Visa</th>
                            <th>Type visa</th>
                            <th>Objectif</th>
                            <th>Date</th>
                            <th>Statut</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="d : ${demandes}">
                            <td class="fw-bold" th:text="${d.numeroDemande}"></td>
                            <td th:text="${d.nom + ' ' + d.prenom}"></td>
                            <td th:text="${d.nationalite}"></td>
                            <td th:text="${d.passeportNumero}"></td>
                            <td th:text="${d.visaReference}"></td>
                            <td th:text="${d.typeVisa.libelle}"></td>
                            <td><small th:text="${d.objectifDemande.libelle}"></small></td>
                            <td th:text="${#temporals.format(d.dateCreation, 'dd/MM/yyyy HH:mm')}"></td>
                            <td>
                                <span class="badge badge-statut" th:classappend="${d.statut.badgeClass}" th:text="${d.statut.libelle}"></span>
                                <i th:if="${d.donneesIncompletes}" class="bi bi-exclamation-triangle-fill text-warning ms-1" title="Données incomplètes"></i>
                            </td>
                            <td>
                                <a th:href="@{/back/demandes/{id}(id=${d.id})}" class="btn btn-sm btn-outline-campus">
                                    <i class="bi bi-eye me-1"></i> Détail
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
