<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Confirmation — Visa Madagascar')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar-front}" th:with="activeMenu='nouvelle'"></nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card-modern">
                <div class="card-body confirmation-box">
                    <div class="check-circle">
                        <i class="bi bi-check-lg"></i>
                    </div>
                    <h2 class="fw-bold text-success mb-3">Demande soumise avec succès</h2>
                    <p class="text-muted mb-4">Votre demande de transformation de visa a été enregistrée.</p>

                    <div th:if="${numeroDemande}" class="alert alert-info d-inline-block px-4 py-3 mb-4" style="border-radius:10px;">
                        <small class="d-block text-muted mb-1">Votre numéro de référence</small>
                        <strong class="fs-4" th:text="${numeroDemande}"></strong>
                    </div>

                    <p class="text-muted small mb-4">
                        <i class="bi bi-info-circle me-1"></i>
                        Conservez ce numéro précieusement. Il vous permettra de suivre l'avancement de votre demande.
                    </p>

                    <div class="d-flex justify-content-center gap-3">
                        <a th:href="@{/front/suivi}" class="btn btn-campus">
                            <i class="bi bi-search me-1"></i> Suivre ma demande
                        </a>
                        <a th:href="@{/front/nouvelle-demande}" class="btn btn-outline-campus">
                            <i class="bi bi-plus-circle me-1"></i> Nouvelle demande
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
