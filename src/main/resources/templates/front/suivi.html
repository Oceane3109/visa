<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Suivi de demande — Visa Madagascar')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar-front}" th:with="activeMenu='suivi'"></nav>

<section class="page-hero">
    <div class="container">
        <h1><i class="bi bi-search me-2"></i>Suivi de demande</h1>
        <p>Retrouvez l'état d'avancement de votre demande de transformation de visa</p>
    </div>
</section>

<div class="container pb-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <!-- Search Form -->
            <div class="card-modern mb-4">
                <div class="card-body p-4">
                    <form th:action="@{/front/suivi}" method="post">
                        <div class="input-group input-group-lg">
                            <span class="input-group-text bg-white border-end-0" style="border-radius: 8px 0 0 8px;">
                                <i class="bi bi-hash text-primary"></i>
                            </span>
                            <input type="text" name="numeroDemande" class="form-control border-start-0"
                                   placeholder="Entrez votre numéro de demande (ex: VT-202604-0001)"
                                   th:value="${numeroDemande}" required style="border-radius: 0;">
                            <button class="btn btn-campus" type="submit" style="border-radius: 0 8px 8px 0;">
                                <i class="bi bi-search me-1"></i> Rechercher
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Error -->
            <div th:if="${erreur}" class="alert alert-warning d-flex align-items-center" style="border-radius: 10px;">
                <i class="bi bi-exclamation-triangle-fill me-2 fs-5"></i>
                <span th:text="${erreur}"></span>
            </div>

            <!-- Result -->
            <div th:if="${demande}" class="card-modern">
                <div class="card-header">
                    <i class="bi bi-file-earmark-text"></i>
                    Demande N° <span th:text="${demande.numeroDemande}"></span>
                </div>
                <div class="card-body">
                    <div class="text-center mb-4">
                        <span class="badge badge-statut fs-6"
                              th:classappend="${demande.statut.badgeClass}"
                              th:text="${demande.statut.libelle}"></span>
                    </div>

                    <div class="row g-3">
                        <div class="col-md-6">
                            <div class="detail-group">
                                <div class="detail-label">Demandeur</div>
                                <div class="detail-value" th:text="${demande.nom + ' ' + demande.prenom}"></div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="detail-group">
                                <div class="detail-label">Date de soumission</div>
                                <div class="detail-value" th:text="${#temporals.format(demande.dateCreation, 'dd/MM/yyyy à HH:mm')}"></div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="detail-group">
                                <div class="detail-label">Type de visa demandé</div>
                                <div class="detail-value" th:text="${demande.typeVisa.libelle}"></div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="detail-group">
                                <div class="detail-label">Objectif</div>
                                <div class="detail-value" th:text="${demande.objectifDemande.libelle}"></div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="detail-group">
                                <div class="detail-label">Référence visa transformable</div>
                                <div class="detail-value" th:text="${demande.visaReference}"></div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="detail-group">
                                <div class="detail-label">N° Passeport</div>
                                <div class="detail-value" th:text="${demande.passeportNumero}"></div>
                            </div>
                        </div>
                    </div>

                    <div th:if="${demande.donneesIncompletes}" class="alert alert-danger mt-4 d-flex align-items-start" style="border-radius: 10px;">
                        <i class="bi bi-exclamation-octagon-fill me-2 mt-1"></i>
                        <div>
                            <strong>Données incomplètes</strong><br>
                            <span th:text="${demande.remarques}"></span>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
